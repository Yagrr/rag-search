[loggers]
keys=root

[handlers]
keys=file

[formatters]
keys=verbose

[logger_root]
level=DEBUG
handlers=file

[handler_file]
class=FileHandler
level=DEBUG
interval=2
backupCount=2
encoding=utf-8
formatter=verbose
filemode=w+
force=True
args=("./cache/search.log",)

[formatter_verbose]
format=%(asctime)s - %(name)s[line:%(lineno)d] - %(levelname)s: %(message)s
